name: cd_docker

on:
  push:
    branches:
      - mainEEEE

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Normalize image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}:cache
          cache-to: type=registry,ref=${{ steps.image.outputs.name }}:cache,mode=max

  deployed:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: copy docker compose to my server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          source: "compose.prod.yml"
          target: "var/www/httpdocs"

      - name: generate .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          script: |
            cd /var/www/httpdoc/app
            cat > .env << 'EOF'
            POSTGRES_DB=${{ secrets.PG_DB }}
            POSTGRES_USER=${{ secrets.PG_USER }}
            POSTGRES_PASSWORD=${{ secrets.PG_PASSWORD }}
            REDIS_ARG=${{ secrets.REDIS_ARG }}
            EOF

            echo "$GHCR_TOKEN" | login gchr.io -u ${{ github.actor }} --password-stdin
            
            docker compose -f compose.prod.yml down || true
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d
            docker image prune -f
