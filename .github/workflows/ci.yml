name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - prod
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: install checkout
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build jar
        run: ./mvnw clean package -DskipTests

